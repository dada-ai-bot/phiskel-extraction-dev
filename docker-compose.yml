services:
  # Forge Extraction - Persona Extraction Pipeline using NVFP4 models
  phiskel-extraction:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phiskel-extraction
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - VLLM_MODEL=${VLLM_MODEL:-Qwen/Qwen3-8B-NVFP4}
      - VLLM_GPU_MEMORY_UTILIZATION=${VLLM_GPU_MEMORY_UTILIZATION:-0.9}
      - VLLM_MAX_MODEL_LEN=${VLLM_MAX_MODEL_LEN:-16384}
      - VLLM_MAX_NUM_SEQS=${VLLM_MAX_NUM_SEQS:-32}
      - IOT_ENDPOINT=${IOT_ENDPOINT}
      - IOT_CERT_PATH=/workspace/certs/external-system.cert.pem
      - IOT_PRIVATE_KEY_PATH=/workspace/certs/external-system.private.key
      - IOT_CA_PATH=/workspace/certs/AmazonRootCA1.pem
      - STAGE=${STAGE}
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - NOSANA_ACCESS_KEY=${NOSANA_ACCESS_KEY}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
    volumes:
      - ./certs:/workspace/certs:ro
      - ./persona_datasets/novels:/workspace/persona_datasets/novels
      - ./persona_datasets/novelOtherExtensions:/workspace/persona_datasets/novelOtherExtensions
      - extraction-output:/workspace/output
      - huggingface-cache:/workspace/.cache
      - extraction-logs:/workspace/logs/extraction_jobs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8000:8000"

volumes:
  extraction-output:
  huggingface-cache:
  extraction-logs:
